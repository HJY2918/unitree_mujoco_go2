robot: "go2"  # Robot name, "go2", "b2", "b2w", "h1", "go2w"
robot_scene: "scene_push.xml" 

domain_id: 1  # Domain id
interface: "lo" # Interface 接口

use_joystick: 0 # Simulate Unitree WirelessController using a gamepad 使用游戏手柄模拟 Unitree WirelessController
joystick_type: "xbox" # support "xbox" and "switch" gamepad layout 支持 “Xbox ”和 “switch ”游戏手柄布局
joystick_device: "/dev/input/js0" # Device path 设备路径
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy  某些游戏控制器可能只有 8 位精度

print_scene_information: 1 # Print link, joint and sensors information of robot

enable_elastic_band: 0 # Virtual spring band, used for lifting h1

# 摆锤释放
enable_pendulum: 1
pendulum_release_time: 10.0
pendulum_init_angle: 1.0
